name: CI

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.claude/**'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # services:
    #   postgres:
    #     image: postgres:17-alpine
    #     env:
    #       POSTGRES_USER: mentalmetal
    #       POSTGRES_PASSWORD: ciTestPassword
    #       POSTGRES_DB: mentalmetal_test
    #     ports:
    #       - 5433:5432
    #     options: >-
    #       --health-cmd pg_isready
    #       --health-interval 10s
    #       --health-timeout 5s
    #       --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore .NET dependencies
        run: dotnet restore src/MentalMetal.slnx

      - name: Build .NET solution
        run: dotnet build src/MentalMetal.slnx --no-restore

      - name: Run backend tests
        run: dotnet test src/MentalMetal.slnx --no-build --verbosity normal

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src/MentalMetal.Web/ClientApp/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: src/MentalMetal.Web/ClientApp

      - name: Run frontend tests
        run: npx ng test --watch=false
        working-directory: src/MentalMetal.Web/ClientApp

      - name: Build Angular app
        run: npx ng build
        working-directory: src/MentalMetal.Web/ClientApp
