schema: spec-driven

context: |
  # Mental Metal
  An AI-powered command center for engineering managers.

  ## Key references (read these for full context)
  - docs/product-brief.md — What we're building and why, all 11 features, success criteria
  - design/domain-model.md — Full DDD domain model: 12 aggregates, value objects, domain services, events
  - design/domain-relationships.md — Aggregate relationships, processing flows (mermaid diagrams)
  - design/spec-plan.md — Full spec breakdown by tier with dependencies

  ## Tech stack
  - Backend: .NET 10, vertical slice architecture, CQRS, DDD rich domain models, minimal APIs
  - Frontend: Angular 21, standalone components, signals, PrimeNG, Tailwind CSS v4
  - Database: PostgreSQL + EF Core
  - AI: BYO provider abstraction (Claude, GPT, Gemini)
  - Deployment: Docker, Google Cloud Run
  - Multi-tenant from day one (user-scoped)

  ## Architecture principles
  - Domain-Driven Design with rich aggregate behaviour (not anemic models)
  - Clean Architecture layers: Domain → Application → Infrastructure → Web
  - Vertical slices within Application layer (feature folders, not layer folders)
  - Aggregates reference each other by ID only, never direct containment
  - Value objects embedded within aggregates
  - All entities are user-scoped (UserId is the tenancy boundary)

  ## Spec tier structure
  - Tier 1 (Foundation): user-auth-tenancy, ai-provider-abstraction, person-management, initiative-management
  - Tier 2 (Core): capture-text, capture-ai-extraction, commitment-tracking, delegation-tracking, initiative-living-brief, initiative-ai-chat, people-lens, global-ai-chat
  - Tier 3 (Enhancement): daily-weekly-briefing, my-queue, daily-close-out, interview-tracking, capture-audio, nudges-rhythms

rules:
  proposal:
    - Reference the product brief and domain model for consistency
    - Include a "Non-goals" section to bound scope
    - Identify which aggregates from the domain model are affected
    - State which tier this spec belongs to and list its dependencies from spec-plan.md
  design:
    - All design decisions must respect DDD aggregate boundaries
    - Document AI prompting strategy where the feature involves AI processing
    - Include a "Dependencies" section listing which other specs must exist first
    - Reference value objects and domain events from design/domain-model.md
  tasks:
    - Break tasks into backend (domain, application, infrastructure, web) and frontend groups
    - Each task should map to roughly one commit
    - Include test tasks for domain unit tests and E2E tests for critical flows
  spec:
    - Write scenarios in WHEN/THEN BDD style
    - Cover happy path, edge cases, and error scenarios
    - Reference domain events that should be raised
    - Include multi-tenant isolation scenarios (user cannot access another user's data)
